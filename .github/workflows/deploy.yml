name: UtiliTrack CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-backend:
    name: Backend — Install and check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Backend/package-lock.json

      - name: Install backend dependencies
        working-directory: Backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: Backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Check backend syntax
        working-directory: Backend
        run: node --check src/index.js

      - name: Verify Dockerfile exists
        run: test -f Backend/Dockerfile && echo "Dockerfile found"

  ci-frontend:
    name: Frontend — Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Build frontend
        working-directory: Frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Verify build output exists
        run: test -d Frontend/dist && echo "Build output found"

  deploy-backend:
    name: Deploy backend to Render
    runs-on: ubuntu-latest
    needs: ci-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "ERROR: RENDER_DEPLOY_HOOK secret is not set."
            echo "Go to GitHub repo Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: RENDER_DEPLOY_HOOK"
            echo "Value: copy from Render dashboard → your service → Settings → Deploy Hook"
            exit 1
          fi
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            --fail \
            --silent \
            --show-error
          echo "Render deploy triggered successfully"

      - name: Wait for Render to deploy
        run: |
          echo "Waiting 90 seconds for Render to build and start..."
          sleep 90

      - name: Verify backend health
        run: |
          if [ -z "${{ secrets.BACKEND_URL }}" ]; then
            echo "ERROR: BACKEND_URL secret is not set."
            exit 1
          fi
          echo "Checking backend health..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.BACKEND_URL }}/api/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy — deployment successful"
              exit 0
            fi
            echo "Not ready yet, waiting 30 seconds..."
            sleep 30
          done
          echo "Backend health check failed after 5 attempts"
          exit 1

  deploy-frontend:
    name: Frontend deploys via Vercel automatically
    runs-on: ubuntu-latest
    needs: ci-frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Vercel auto-deploys on push
        run: |
          echo "Vercel is connected to this GitHub repo"
          echo "It detects every push to main and deploys automatically"
          echo "No manual step needed — check vercel.com dashboard for status"