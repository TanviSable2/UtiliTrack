name: UtiliTrack CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-backend:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Backend/package-lock.json

      - name: Install backend dependencies
        working-directory: Backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: Backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Check backend syntax
        working-directory: Backend
        run: node --check src/index.js

  ci-frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Build frontend
        working-directory: Frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: Frontend/dist/
          retention-days: 1

  deploy-backend:
    name: Deploy Backend to App Runner
    runs-on: ubuntu-latest
    needs: ci-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Trigger App Runner deployment
        run: |
          aws apprunner start-deployment \
            --service-arn ${{ secrets.APP_RUNNER_SERVICE_ARN }}
          echo "App Runner deployment triggered"

      - name: Wait for deployment to complete
        run: |
          echo "Waiting 90 seconds for App Runner to deploy..."
          sleep 90

      - name: Verify backend health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.BACKEND_URL }}/api/health)
          echo "Health check returned: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Backend health check FAILED"
            exit 1
          fi
          echo "Backend deployed and healthy"

  deploy-frontend:
    name: Frontend deploys via Amplify automatically
    runs-on: ubuntu-latest
    needs: ci-frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Amplify auto-deploys on GitHub push
        run: |
          echo "AWS Amplify is connected to this GitHub repo"
          echo "It detects the push to main and deploys automatically"
          echo "No manual step needed here"